# Render Blueprint : API NestJS (plan gratuit avec mise en veille).
# Render → New → Blueprint → sélectionner ce dépôt.
# Puis ajouter GITHUB_TOKEN dans Environment (voir README).

services:
  - type: web
    name: devscope-api
    env: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build -w apps/api
    startCommand: npm run start:prod -w apps/api
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: GITHUB_TOKEN
        sync: false
